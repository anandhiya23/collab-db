<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="7" fill="#6366f1"/>
  <!-- git branch icon: main vertical line, branch, dots -->
  <!-- bottom node -->
  <circle cx="11" cy="24" r="3" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- top node -->
  <circle cx="11" cy="8" r="3" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- branch node -->
  <circle cx="22" cy="14" r="3" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- vertical stem -->
  <line x1="11" y1="11" x2="11" y2="21" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- branch curve -->
  <path d="M11 13 C11 18 22 18 22 17" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
</svg>
